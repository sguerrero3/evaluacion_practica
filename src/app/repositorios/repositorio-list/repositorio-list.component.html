<div class="container">

  <h1 class="text-center my-5">Repositorios</h1>

  <table class="table align-middle">
      <thead class="table-light">
        <tr class="text-center">
          <th scope="col">#</th>
          <th scope="col">Name</th>
          <th scope="col">Language</th>
          <th scope="col">Stars</th>
          <th scope="col">Creado</th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr class="text-center" *ngFor="let repositorio of repositorios">
          <th scope="row">{{ repositorio.id }}</th>
          <td>{{ repositorio.name }}</td>
          <td>{{ repositorio.language }}</td>
          <td>{{ repositorio.stars }}</td>
          <td>{{ repositorio.createdAt }}</td>
          <td>
            <button class="btn btn-secondary" routerLink="/repositorios/{{ repositorio.id }}">Detalles</button>
          </td>
        </tr>
      </tbody>
  </table>
</div>
